name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: true

      - name: Check formatting (gofmt)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "❌ These files are not formatted:"
            echo "$unformatted"
            echo ""
            echo "Run: gofmt -w ."
            exit 1
          fi
          echo "✅ All files are properly formatted"

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Check imports (goimports)
        run: |
          unformatted=$(goimports -l .)
          if [ -n "$unformatted" ]; then
            echo "❌ These files have import issues:"
            echo "$unformatted"
            echo ""
            echo "Run: goimports -w ."
            exit 1
          fi
          echo "✅ All imports are clean"

  build:
    name: Build - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: lint-and-format

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            output: localmind
            goos: linux

          - os: macos-latest
            output: localmind
            goos: darwin

          - os: windows-latest
            output: localmind.exe
            goos: windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: true

      - name: Install dependencies
        run: go mod tidy

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
        run: go build -v -o ${{ matrix.output }} .

      - name: Verify binary exists
        shell: bash
        run: |
          if [ -f "${{ matrix.output }}" ]; then
            echo "✅ Binary built successfully: ${{ matrix.output }}"
          else
            echo "❌ Binary not found: ${{ matrix.output }}"
            exit 1
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: localmind-${{ matrix.goos }}
          path: ${{ matrix.output }}
          retention-days: 7

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-and-format

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: true

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Show coverage
        run: go tool cover -func=coverage.out

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7